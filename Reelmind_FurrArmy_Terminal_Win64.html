<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reelmind Corp / Furr Army Secure Terminal - Win64</title>
<style>
body{background:#0b0f1a;color:#00ff9c;font-family:Consolas,monospace;padding:30px}
#window{width:900px;margin:auto;border:2px solid #1e2a44;box-shadow:0 0 20px #000}
#titlebar{background:#1e2a44;color:white;padding:6px;font-size:14px}
#terminal{background:black;height:500px;overflow-y:auto;padding:10px;white-space:pre-line}
#inputLine{background:black;padding:10px;border-top:1px solid #1e2a44;display:none}
input{background:black;border:none;color:#00ff9c;font-family:Consolas,monospace;font-size:14px;width:80%;outline:none}
#loginBox{background:black;padding:20px;border-top:1px solid #1e2a44}
button{background:#00ff9c;border:none;padding:5px 12px;margin-top:5px;cursor:pointer}
.cmd{color:#00ffaa}.warn{color:yellow}.err{color:red}.ok{color:#00ff9c}.lock{color:#ff3030;font-weight:bold}
</style>
</head>
<body>

<div id="window">
<div id="titlebar">Reelmind Corporation / Furr Army Secure Command Terminal [Windows x64]</div>
<div id="terminal"></div>

<div id="loginBox">
Username:<br>
<input id="user"><br><br>
Password:<br>
<input id="pass" type="password"><br><br>
<button onclick="login()">Login</button>
</div>

<div id="inputLine">
> <input id="cmd" autocomplete="off">
</div>
</div>

<script>

const terminal=document.getElementById("terminal")
const input=document.getElementById("cmd")
let currentUser=""
let loginAttempts=0

const users=[
{user:"commander",pass:"furrarmy"},
{user:"director",pass:"reelmind"},
{user:"admin",pass:"root"},
{user:"h.k",pass:"12345"},
{user:"isd",pass:"isd1505"}
]

const files={
"readme.txt":{content:"Welcome to the Reelmind / Furr Army command network."},
"alliance.log":{content:"Treaty Signed: Reelmind Corporation + Furr Army Strategic Alliance."},
"classified.dat":{encrypted:true,content:"BLACK ARCHIVE ENTRY: PROJECT NIGHT HOWL"},
"protocol_sd.txt":{slow:true,content:`⚠ PROTOCOL SD
Strategic Defense Contingency Directive

Classification: RED / BLACK CLEARANCE

Official Designation
SD = Strategic Defense

Protocol SD activates when the Furr Army detects:
- Large-scale external threat buildup
- Coordinated attack planning
- Multiple divisions compromised
- Intelligence indicating imminent Code Red escalation

Purpose of Protocol SD
- Harden base infrastructure
- Lock non‑essential systems
- Pre‑deploy heavy units
- Increase monitoring

Activation Authority
- AFC High Command
- Director-General FAIA
- FAISD Commander (emergency)

Operational Changes
- 6th FATD defensive formation
- 12th FAHT rapid standby
- 4th AFC air patrol readiness
- FAIA surveillance cycle active
- FAISD integrity audits

Hidden Clause
If three divisions report compromise simultaneously,
Protocol SD escalates automatically to: PROTOCOL OMEGA.

"Prepare Before They Strike."`}
},
"alliance.log":{content:"Treaty Signed: Reelmind Corporation + Furr Army Strategic Alliance."},
"classified.dat":{encrypted:true,content:"BLACK ARCHIVE ENTRY: PROJECT NIGHT HOWL"}
}

function print(text,cls=""){
const line=document.createElement("div")
line.textContent=text
if(cls) line.classList.add(cls)
terminal.appendChild(line)
terminal.scrollTop=terminal.scrollHeight
}

function slowPrint(text,speed=20,callback=null){
let i=0
const line=document.createElement("div")
terminal.appendChild(line)
function type(){
if(i<text.length){line.textContent+=text[i];i++;setTimeout(type,speed)}
else{if(callback)callback()}
}
type()
}

function boot(){
slowPrint("Booting Secure Command Environment...")
slowPrint("Kernel: Windows x64 Secure Build")
slowPrint("Alliance Network: Reelmind Corp + Furr Army")
slowPrint("Security Modules Online")
slowPrint("Awaiting Authentication...")
}

function login(){
const u=document.getElementById("user").value.toLowerCase()
const p=document.getElementById("pass").value
const valid=users.find(x=>x.user===u && x.pass===p)

if(valid){
currentUser=u
print("ACCESS GRANTED","ok")
print("Welcome "+currentUser)

// special HK event
if(currentUser==="h.k"){
print("Background intrusion script detected...","warn")
startHKHack()
return
}

if(currentUser==="isd"){
startISDSequence()
return
}

print("Type 'help' for commands")

document.getElementById("loginBox").style.display="none"
document.getElementById("inputLine").style.display="block"
input.focus()

}else{
loginAttempts++
print("ACCESS DENIED","err")
print("Failed Attempts: "+loginAttempts+" / 3","warn")

if(loginAttempts>=3){
lockdown()
}
}
}

function startISDSequence(){

document.getElementById("loginBox").style.display="none"

slowPrint("ISD Secure Node Connected...")
slowPrint("Initializing Intelligence Systems Division Access...")

startLoadingScreen("ISD AUTHENTICATION LOADING",60,()=>{
startLoadingScreen("ACCESSING ISD SECURE DATABASE",60,()=>{
print("ISD NETWORK READY","ok")
print("Welcome Intelligence Systems Division Agent","ok")
})
})

}

function startLoadingScreen(title,seconds,callback){

print(title,"warn")

let progress=0
const bar=document.createElement("div")
terminal.appendChild(bar)

const interval=setInterval(()=>{

progress++
let percent=Math.floor((progress/seconds)*100)
let blocks=Math.floor(percent/5)

bar.textContent="["+"█".repeat(blocks)+"░".repeat(20-blocks)+"] "+percent+"%"

if(progress>=seconds){
clearInterval(interval)
print("Loading Complete","ok")
if(callback)callback()
}

terminal.scrollTop=terminal.scrollHeight

},1000)

}

function startHKHack(){

document.getElementById("loginBox").style.display="none"

slowPrint("Unknown process started...")
slowPrint("Connecting to external node...")
slowPrint("Attempting system breach...")

let progress=0
const seconds=120

const bar=document.createElement("div")
terminal.appendChild(bar)

const interval=setInterval(()=>{
progress++

let percent=Math.floor((progress/seconds)*100)
let blocks=Math.floor(percent/5)

bar.textContent="["+"█".repeat(blocks)+"░".repeat(20-blocks)+"] "+percent+"%"

if(progress>=seconds){
clearInterval(interval)
print("","lock")
print("SECURITY AI DETECTED INTRUSION","err")
print("Hack attempt failed","err")
print("Reelmind Firewall terminated connection","warn")
}

terminal.scrollTop=terminal.scrollHeight

},1000)

}

function lockdown(){
print("","lock")
slowPrint("!!! SECURITY LOCKDOWN INITIATED !!!",10)
slowPrint("Unauthorized access detected",10)
slowPrint("Locking terminal interface...",10)

let flashes=0

const flashInterval=setInterval(()=>{

if(flashes%2===0){
document.body.style.background="#200"
}else{
document.body.style.background="#000"
}

flashes++

if(flashes>10){
clearInterval(flashInterval)
slowPrint("System rebooting...",15)

setTimeout(()=>{
location.reload()
},2000)
}

},200)
}

function run(cmd){
print(currentUser+"> "+cmd,"cmd")
const args=cmd.split(" ")

if(cmd==="help"){
print("Commands:")
print("help")
print("clear")
print("system")
print("dir")
print("open <file>")
print("decrypt <file>")
print("hack1 hack2 hack3")
}

else if(cmd==="clear"){
terminal.innerHTML=""
}

else if(cmd==="system"){
print("System: Windows x64 Secure Terminal")
print("Corp: Reelmind Corporation")
print("Military: Furr Army Alliance Network")
print("Security Status: ACTIVE")
}

else if(cmd==="dir"){
print("Directory Listing:")
for(const f in files){print(" - "+f)}
}

else if(args[0]==="open"){
const f=args[1]
if(!files[f]){print("File not found","err");return}

if(files[f].encrypted){
print("FILE ENCRYPTED","warn")
}else{
if(files[f].slow){
const lines=files[f].content.split("
")
let i=0
function next(){
if(i<lines.length){
slowPrint(lines[i])
i++
setTimeout(next,120)
}
}
next()
}else{
print(files[f].content)
}
}
}

else if(args[0]==="decrypt"){
const f=args[1]
if(!files[f]){print("File not found","err");return}

if(!files[f].encrypted){
print("File already readable")
return
}

slowPrint("Decrypting file...")
setTimeout(()=>{
print("DECRYPTION COMPLETE","ok")
print(files[f].content)
files[f].encrypted=false
},2000)
}

else if(cmd==="hack1"){hackProcess(60)}
else if(cmd==="hack2"){hackProcess(120)}
else if(cmd==="hack3"){hackProcess(180)}

else{
print("Unknown command","err")
}
}

function hackProcess(seconds){
let progress=0
const bar=document.createElement("div")
terminal.appendChild(bar)

const interval=setInterval(()=>{
progress++
let percent=Math.floor((progress/seconds)*100)
let blocks=Math.floor(percent/5)
bar.textContent="["+"█".repeat(blocks)+"░".repeat(20-blocks)+"] "+percent+"%"

if(progress>=seconds){
clearInterval(interval)
print("INTRUSION BLOCKED","err")
print("Reelmind Firewall prevented breach","warn")
}

terminal.scrollTop=terminal.scrollHeight
},1000)
}

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
run(input.value.toLowerCase())
input.value=""
}
})

boot()


// --- Boot sequence fix ---
const terminalElement = document.getElementById("terminal")
function bootPrint(t){
 const line=document.createElement("div")
 line.textContent=t
 if(terminalElement) terminalElement.appendChild(line)
}

window.addEventListener("load",()=>{
 if(!terminalElement) return
 bootPrint("Reelmind Corp Secure System Booting...")
 bootPrint("Initializing Furr Army Command Interface...")
 bootPrint("Loading Secure Modules...")
 bootPrint("System Ready.")
})

</script>
</body>
</html>
