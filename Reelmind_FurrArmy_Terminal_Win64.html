<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reelmind Corp / Furr Army Secure Terminal - Win64</title>
<style>
body{
background:#0b0f1a;
color:#00ff9c;
font-family:Consolas,monospace;
padding:30px;
}

#window{
width:900px;
margin:auto;
border:2px solid #1e2a44;
box-shadow:0 0 20px #000;
}

#titlebar{
background:#1e2a44;
color:white;
padding:6px;
font-size:14px;
}

#terminal{
background:black;
height:500px;
overflow-y:auto;
padding:10px;
white-space:pre-line;
}

#inputLine{
background:black;
padding:10px;
border-top:1px solid #1e2a44;
display:none;
}

input{
background:black;
border:none;
color:#00ff9c;
font-family:Consolas,monospace;
font-size:14px;
width:80%;
outline:none;
}

#loginBox{
background:black;
padding:20px;
border-top:1px solid #1e2a44;
}

button{
background:#00ff9c;
border:none;
padding:5px 12px;
margin-top:5px;
cursor:pointer;
}

.cmd{color:#00ffaa;}
.warn{color:yellow;}
.err{color:red;}
.ok{color:#00ff9c;}
</style>
</head>
<body>

<div id="window">

<div id="titlebar">Reelmind Corporation / Furr Army Secure Command Terminal [Windows x64]</div>

<div id="terminal"></div>

<div id="loginBox">
Username:<br>
<input id="user"><br><br>
Password:<br>
<input id="pass" type="password"><br><br>
<button onclick="login()">Login</button>
</div>

<div id="inputLine">
> <input id="cmd" autocomplete="off">
</div>

</div>

<script>

const terminal=document.getElementById("terminal");
const input=document.getElementById("cmd");

let currentUser="";

const users=[
{user:"commander",pass:"furrarmy"},
{user:"director",pass:"reelmind"},
{user:"admin",pass:"root"}
];

function print(text,cls=""){
const line=document.createElement("div");
line.textContent=text;
if(cls) line.classList.add(cls);
terminal.appendChild(line);
terminal.scrollTop=terminal.scrollHeight;
}

function slowPrint(text,speed=25,callback=null){
let i=0;
const line=document.createElement("div");
terminal.appendChild(line);

function type(){
if(i<text.length){
line.textContent+=text.charAt(i);
i++;
setTimeout(type,speed);
}else{
if(callback) callback();
}
}

type();
}

function boot(){
slowPrint("Booting Secure Command Environment...");
slowPrint("Kernel: Windows x64 Secure Build");
slowPrint("Organization Link: Reelmind Corp + Furr Army");
slowPrint("Initializing security modules...");
slowPrint("Awaiting authentication...");
}

function login(){

const u=document.getElementById("user").value;
const p=document.getElementById("pass").value;

const valid=users.find(x=>x.user===u && x.pass===p);

if(valid){

currentUser=u;

print("Access Granted","ok");
print("Welcome "+currentUser);
print("Type 'help' for commands");


document.getElementById("loginBox").style.display="none";
document.getElementById("inputLine").style.display="block";
input.focus();

}else{
print("Access Denied","err");
}

}

function run(cmd){

print(currentUser+"> "+cmd,"cmd");

if(cmd==="help"){
print("Available commands:");
print("help");
print("clear");
print("system");
print("hack1");
print("hack2");
print("hack3");
print("archives");
}

else if(cmd==="clear"){
terminal.innerHTML="";
}

else if(cmd==="system"){
print("System: Windows x64 Secure Terminal");
print("Organization: Reelmind Corporation");
print("Alliance: Furr Army Military Network");
print("Security Status: ACTIVE");
}

else if(cmd==="archives"){
print("Opening Classified Archive Database...");
print("Access Level Required: HIGH COMMAND","warn");
}

else if(cmd==="hack1"){
hackProcess(60);
}

else if(cmd==="hack2"){
hackProcess(120);
}

else if(cmd==="hack3"){
hackProcess(180);
}

else{
print("Unknown command","err");
}

}

function hackProcess(seconds){

let progress=0;

const bar=document.createElement("div");
terminal.appendChild(bar);

const interval=setInterval(()=>{

progress++;

let percent=Math.floor((progress/seconds)*100);
let blocks=Math.floor(percent/5);

bar.textContent="["+"█".repeat(blocks)+"░".repeat(20-blocks)+"] "+percent+"%";

if(progress>=seconds){

clearInterval(interval);

print("INTRUSION BLOCKED","err");
print("Reelmind Corp Firewall prevented breach","warn");

}

terminal.scrollTop=terminal.scrollHeight;

},1000);

}

input.addEventListener("keydown",function(e){
if(e.key==="Enter"){
run(input.value.toLowerCase());
input.value="";
}
});

boot();

</script>

</body>
</html>
