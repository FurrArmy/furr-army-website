<!DOCTYPE html>
<html>
<head>
  <title>Command Terminal</title>
  <style>
    body {
      background: black;
      color: #00ffaa;
      font-family: monospace;
      padding: 30px;
    }

    #terminal {
      white-space: pre-line;
      max-height: 500px;
      overflow-y: auto;
    }

    #cursor {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% {opacity:1;}
      50% {opacity:0;}
      100% {opacity:1;}
    }

    input {
      background: black;
      color: #00ffaa;
      border: 1px solid #00ffaa;
      font-family: monospace;
      padding: 5px;
    }

    button {
      background: #00ffaa;
      color: black;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
    }

    .progress-bar {
      display: inline-block;
      width: 100%;
      border: 1px solid #00ffaa;
      margin-top: 5px;
    }

    .progress-fill {
      display: inline-block;
      height: 1em;
      background: #00ffaa;
      width: 0%;
    }
  </style>
</head>

<body>

<h2>FURR ARMY COMMAND TERMINAL</h2>

<div id="terminal"></div>
<span id="cursor">█</span>

<br><br>

<input id="cmd" placeholder="Enter command">
<button onclick="runCommand()">Execute</button>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");

function slowPrint(text, speed = 35, callback = null){
  let i = 0;
  function type() {
    if(i < text.length){
      terminal.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, speed);
    } else {
      terminal.innerHTML += "<br>";
      if(callback) callback();
      terminal.scrollTop = terminal.scrollHeight;
    }
  }
  type();
}

function runCommand() {
  let cmd = input.value.toLowerCase();
  input.value = ""; // clear input after command

  if(cmd === "help"){
    slowPrint("AVAILABLE COMMANDS:");
    slowPrint("help");
    slowPrint("launch");
    slowPrint("/hack isd");
    slowPrint("/classified");
    slowPrint("/warhead d");
    slowPrint("clear");
  }
  else if(cmd === "launch"){
    slowPrint("COMMAND ACCEPTED");
    slowPrint("Loading Warhead Control System...");
    slowPrint("Accessing Secure Network...");
    slowPrint("Decrypting Launch Authorization...");
    setTimeout(()=>slowPrint("AUTHORIZATION GRANTED"), 3000);
    setTimeout(()=>slowPrint("Opening Launch Silo..."), 5000);
    setTimeout(()=>slowPrint("Fuel Systems Online..."), 7000);
    setTimeout(()=>slowPrint("Target Coordinates Locked"), 9000);
    setTimeout(()=>slowPrint("Beginning Countdown"), 11000);
    setTimeout(()=>slowPrint("5"), 13000);
    setTimeout(()=>slowPrint("4"), 14000);
    setTimeout(()=>slowPrint("3"), 15000);
    setTimeout(()=>slowPrint("2"), 16000);
    setTimeout(()=>slowPrint("1"), 17000);
    setTimeout(()=>slowPrint("WARHEAD LAUNCH SIMULATION COMPLETE"), 18500);
  }
  else if(cmd === "/hack isd"){
    slowPrint("COMMAND RECEIVED: /hack ISD");
    slowPrint("Attempting connection to ISD secure servers...");
    slowPrint("Bypassing firewall...");
    slowPrint("Injecting access packet...");
    slowPrint("Searching for vulnerabilities...");
    setTimeout(()=>slowPrint("ACCESS DENIED"), 4000);
    setTimeout(()=>slowPrint("ISD Intrusion Detection System Triggered"), 5500);
    setTimeout(()=>slowPrint("SECURITY ALERT: Unauthorized access attempt"), 7000);
    setTimeout(()=>slowPrint("Trace protocol started..."), 8500);
    setTimeout(()=>slowPrint("Connection terminated."), 10000);
    setTimeout(()=>slowPrint("Hack attempt FAILED."), 11500);
  }
  else if(cmd === "/classified"){
    slowPrint("ACCESS REQUEST: CLASSIFIED ARCHIVE");
    slowPrint("Authentication bypass attempt started...");
    slowPrint("Connecting to secure archive node...");

    let progress = 0;
    let hacking = setInterval(function(){
      progress += 5;
      slowPrint("Decrypting archive... " + progress + "%");
      if(progress >= 100){
        clearInterval(hacking);
        slowPrint("ACCESS DENIED");
        slowPrint("SECURITY PROTOCOL TRIGGERED");
        slowPrint("Classified Archive remains locked.");
        slowPrint("Hack attempt FAILED.");
      }
    }, 3000);
  }
  else if(cmd === "/warhead d"){
    slowPrint("COMMAND RECEIVED: /warhead D");
    slowPrint("Initializing Warhead Hack Simulation (90s)...");

    // create progress bar
    terminal.innerHTML += '<div class="progress-bar"><div class="progress-fill" id="warhead-bar"></div></div><br>';
    const bar = document.getElementById("warhead-bar");
    let progress = 0;
    const intervalTime = 90 * 1000 / 100; // 90 seconds for 100 steps

    const hackInterval = setInterval(() => {
      progress++;
      bar.style.width = progress + "%";
      terminal.scrollTop = terminal.scrollHeight;

      if(progress >= 100){
        clearInterval(hackInterval);
        slowPrint("WARHEAD HACK FAILED");
        slowPrint("SECURITY PROTOCOL ENGAGED");
      }
    }, intervalTime);
  }
  else if(cmd === "clear"){
    terminal.innerHTML = "";
  }
  else {
    slowPrint("Unknown command. Type 'help' for a list of commands.");
  }
}

// Optional: allow pressing Enter to run command
input.addEventListener("keypress", function(e){
  if(e.key === "Enter") runCommand();
});
</script>

</body>
</html>
